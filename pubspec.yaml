name: nikki
description: "Camera-based novel reading assistant for learning foreign languages."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter

  # Camera
  camera: ^0.11.1

  # State management
  provider: ^6.1.5

  # Local database
  sqflite: ^2.4.2
  path: ^1.9.1

  # HTTP
  http: ^1.3.0

  # Storage
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^9.2.4

  # Permissions
  permission_handler: ^11.4.0

  # Motion detection (camera idle sleep)
  sensors_plus: ^6.1.1

  # SVG rendering
  flutter_svg: ^2.0.17

  # Export / Import
  share_plus: ^10.1.4
  file_picker: ^8.3.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/nikki-logo.png"
  adaptive_icon_background: "#FAF0E6"
  adaptive_icon_foreground: "assets/icons/nikki-logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
